<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Transaction Ledger | Digital Vault</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b7c4ff",
                        "secondary": "#4edea3",
                        "tertiary": "#ffb2b7",
                        "surface": "#111318",
                        "background": "#111318",
                        "on-surface": "#e2e2e8",
                        "on-surface-variant": "#c3c5d9",
                        "surface-container": "#1e2024",
                        "surface-container-lowest": "#0c0e12",
                        "surface-container-low": "#1a1c20",
                        "outline-variant": "#434656",
                        "primary-container": "#0052ff",
                        "secondary-container": "#00a572",
                        "tertiary-container": "#c71941",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #111318; color: #e2e2e8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-body selection:bg-primary-container selection:text-on-primary-container">

    <nav class="fixed top-0 left-0 w-full flex items-center justify-between px-6 h-16 bg-[#111318]/60 backdrop-blur-xl z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-surface-container overflow-hidden">
                <img alt="User" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfgXi8W4mTz4KKwwf0GNEEiaOFP8T04pcS1FlnNqt7ZrfV-nlTdpU9DPL-9TYknm25sV6ogcUTos7rZHAYcM58LxvR1q4THGC8SJ11z0tGaXWtjWLAulbFb8xQ6Irfbk1ny0-WSgq9wB8bUNTRnaNBxP-Sbv3qa90dll_H_kXKW6feBOj0JDuS20byXg3ENgSZ9rrOnhDW5NpzPHeRbeo1FAny18Pi2DugXPXN89_bVvF3F7zjSA3nGfAv-szS1eTY3S0wC1pAVwjZ"/>

        </div>
        <button class="p-2 rounded-full hover:bg-[#282a2e] text-[#b7c4ff]">
            <span class="material-symbols-outlined">notifications</span>

    </nav>

    <main class="pt-20 pb-32 px-4 max-w-2xl mx-auto space-y-8">
        <section class="space-y-6">
            <div class="relative group">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant">
                    <span class="material-symbols-outlined text-lg">search</span>
                </div>
                <input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 pl-12 pr-4 text-on-surface focus:ring-2 focus:ring-primary/40" placeholder="Search transactions..." type="text"/>
            </div>
            
            <div class="flex items-center gap-3 overflow-x-auto no-scrollbar">

                <button class="flex-shrink-0 px-5 py-2 rounded-full bg-surface-container-low text-on-surface-variant font-headline font-bold text-sm">August 2023</button>

            </div>
        </section>

        <section class="space-y-8">
            <div>

                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center text-primary">

                        <div class="text-right">

                    </div>

                    <div class="bg-surface-container-low rounded-2xl p-4 flex items-center justify-between cursor-pointer hover:bg-surface-container transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center text-tertiary">
                                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
                            </div>
                            <div>
                                <h3 class="font-headline font-bold text-on-surface">Octopus Energy</h3>

                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="font-headline font-extrabold text-lg text-on-surface">-£115.00</span>
                            <p class="text-[10px] text-outline-variant">09:15 AM</p>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#111318]/90 backdrop-blur-xl rounded-t-[2rem] shadow-[0_-8px_32px_rgba(0,0,0,0.3)]">
        
        <a href="index.html" class="flex flex-col items-center text-[#434656] py-2 px-4 hover:text-[#b7c4ff] transition-all">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-medium uppercase mt-1">Dashboard</span>
        </a>

        <a href="alltransactions.html" class="flex flex-col items-center text-[#b7c4ff] bg-[#1e2024] rounded-2xl py-2 px-4 transition-all">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>

        <a href="uploadstatement.html" class="flex flex-col items-center text-[#434656] py-2 px-4 hover:text-[#b7c4ff] transition-all">

        </a>

        <a href="insights.html" class="flex flex-col items-center text-[#434656] py-2 px-4 hover:text-[#b7c4ff] transition-all">
